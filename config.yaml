general:
  organism: Mouse
  condition: condition

paths:
  counts: "data/salmon.merged.gene_counts.tsv"
  metadata: "meta/meta.xlsx"
  adata_filtered: "data/adata_filter_genes.h5ad"

01_create_anndata_object:
  gene_id_col: "gene_id"
  condition_columns: 
    - 'treatment'
    - 'Age'
  filtering_sum: 10

02_data_exploration:
  # uses general.condition
  # uses paths.adata_filtered
  design: null   # optional override

03_create_contrast:
  paired_contrast:
    - ["Control_Young","Trained_Young"]
    - ["Control_Young","Control_Old"]
    - ["Control_Old","Trained_Old"]
    - ["Trained_Young","Trained_Old"]
  # uses general.condition
  design: null   # optional override

04_compute_pathway_per_contrast:
  # uses general.organism


# --------------------------------------------------
# Modules definition
# mode:
#   - "menu"   → multiple pages (per contrast)
#   - "single" → one static page
# --------------------------------------------------
05_generate_quarto:
  contrast_folder: "results/contrasts/"
  output_folder: "QUARTO/"
  template_dir: "Quarto_template/"

  project_title: "HSPC Aging"
  author_name: "Maelick Brochut"
  split_to_remove: 1

  modules:
    QC:
      name: "Quality Control"
      type: "single"
      file: "QC.qmd"
      include: true

    DE:
      name: "Differential Analysis"
      type: "menu"
      template: "Differential_analysis_template.qmd"
      prefix: ""
      model: "condition"
      include: true

    TF:
      name: "TF Inference"
      type: "menu"
      template: "TF_inference_template.qmd"
      prefix: "TF_"
      model: "condition"
      include: true   # example toggle

    pathway:
      name: "Pathway Summary"
      type: "single"
      file: "pathway_summary.qmd"
      include: true

    venn:
      name: "Venn"
      type: "single"
      file: "venn.qmd"
      include: true